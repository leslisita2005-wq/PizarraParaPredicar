<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizarra Ágil de Predicación</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .tablero {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .columna {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
      width: 200px;
      min-height: 300px;
    }

    .columna h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .tarjeta {
      background: rgba(255,255,255,0.2);
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      position: relative;
    }

    .acciones-tarjeta {
      margin-top: 8px;
      display: flex;
      gap: 5px;
      justify-content: flex-end;
    }

    .btn-accion {
      background: rgba(255,255,255,0.3);
      color: white;
      border: none;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    .btn-accion:hover {
      background: rgba(255,255,255,0.5);
    }

    .formulario {
      text-align: center;
      margin-bottom: 20px;
    }

    input, button {
      padding: 8px;
      margin: 5px;
      border: none;
      border-radius: 5px;
    }

    input[type="datetime-local"] {
      font-family: inherit;
      cursor: pointer;
    }

    button {
      background: #ffcc00;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>📌 Pizarra Ágil de Predicación</h1>

  <div class="formulario">
    <input type="hidden" id="tarjeta_id">
    
    <input type="text" id="nombre" placeholder="Tu nombre" required>
    <label for="fecha_hora" style="font-size: 14px; margin-left: 5px;">Fecha y Hora:</label>
    <input type="datetime-local" id="fecha_hora" required>
    <button id="btn-guardar" onclick="agregarOModificarTarjeta()">Anotarme</button>
  </div>

  <div class="tablero">
    <div class="columna" id="lunes"><h2>Lunes</h2></div>
    <div class="columna" id="martes"><h2>Martes</h2></div>
    <div class="columna" id="miércoles"><h2>Miércoles</h2></div>
    <div class="columna" id="jueves"><h2>Jueves</h2></div>
    <div class="columna" id="viernes"><h2>Viernes</h2></div>
    <div class="columna" id="sábado"><h2>Sábado</h2></div>
    <div class="columna" id="domingo"><h2>Domingo</h2></div>
  </div>

  <script>
    // Configuración de la conexión segura con Supabase
    const SUPABASE_URL = "https://vbrxgzvnklkkjmwcxagj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_TE6ujP96_tZV9oDGwu4lIQ_U8RfZL6E"; 

    const database = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = async function() {
      await cargarTarjetas();
    }

    // Mapeo para traducir los días del formato internacional JS al tablero
    const diasSemana = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];

    async function cargarTarjetas() {
      const dias = ['lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado', 'domingo'];
      dias.forEach(d => {
        const col = document.getElementById(d);
        col.innerHTML = `<h2>${d.charAt(0).toUpperCase() + d.slice(1)}</h2>`;
      });

      // Leer los turnos de la tabla ordenados cronológicamente por la hora
      const { data, error } = await database
        .from('predicacion')
        .select('*')
        .order('hora', { ascending: true });

      if (error) {
        console.error("Error cargando datos:", error);
        return;
      }

      if (data) {
        data.forEach(item => {
          // Si el registro viejo solo guardaba la hora suelta, usamos la hora; si no, formateamos la fecha completa.
          let fechaMostrar = item.hora;
          let diaColumna = item.dia;

          if (item.hora.includes("T") || item.hora.includes("-")) {
            const fechaObj = new Date(item.hora);
            // Formato amigable en español: DD/MM/AAAA hh:mm
            const diaMes = String(fechaObj.getDate()).padStart(2, '0');
            const mes = String(fechaObj.getMonth() + 1).padStart(2, '0');
            const horas = String(fechaObj.getHours()).padStart(2, '0');
            const minutos = String(fechaObj.getMinutes()).padStart(2, '0');
            
            fechaMostrar = `${diaMes}/${mes} - ${horas}:${minutos}`;
            diaColumna = diasSemana[fechaObj.getDay()];
          }

          const colDestino = document.getElementById(diaColumna);
          if (colDestino) {
            const tarjeta = document.createElement('div');
            tarjeta.className = 'tarjeta';
            tarjeta.innerHTML = `
              <strong>${item.nombre}</strong><br><small>${fechaMostrar}</small>
              <div class="acciones-tarjeta">
                <button class="btn-accion" onclick="prepararEdicion(${item.id}, '${item.nombre}', '${item.hora}')">✏️ Editar</button>
                <button class="btn-accion" style="background: rgba(255,0,0,0.4);" onclick="eliminarTarjeta(${item.id})">🗑️ Borrar</button>
              </div>
            `;
            colDestino.appendChild(tarjeta);
          }
        });
      }
    }

    async function agregarOModificarTarjeta() {
      const id = document.getElementById('tarjeta_id').value;
      const nombre = document.getElementById('nombre').value;
      const fechaHoraValor = document.getElementById('fecha_hora').value;

      if(nombre && fechaHoraValor) {
        // Calculamos automáticamente el día de la semana basándonos en la fecha elegida
        const fechaObj = new Date(fechaHoraValor);
        const diaCalculado = diasSemana[fechaObj.getDay()];

        if (id) {
          const { error } = await database
            .from('predicacion')
            .update({ nombre: nombre, dia: diaCalculado, hora: fechaHoraValor })
            .eq('id', id);

          if (error) alert("Error al modificar.");
        } else {
          const { error } = await database
            .from('predicacion')
            .insert([{ nombre: nombre, dia: diaCalculado, hora: fechaHoraValor }]);

          if (error) alert("Error al guardar.");
        }

        // Limpiar el formulario
        document.getElementById('tarjeta_id').value = '';
        document.getElementById('nombre').value = '';
        document.getElementById('fecha_hora').value = '';
        document.getElementById('btn-guardar').innerText = 'Anotarme';
        
        await cargarTarjetas();
      } else {
        alert("Completa todos los campos.");
      }
    }

    function prepararEdicion(id, nombre, fechaHora) {
      document.getElementById('tarjeta_id').value = id;
      document.getElementById('nombre').value = nombre;
      
      // Si viene con el formato correcto de fecha completa, lo cargamos en el input
      if(fechaHora.includes("T")) {
        document.getElementById('fecha_hora').value = fechaHora;
      }
      
      document.getElementById('btn-guardar').innerText = '💾 Guardar Cambios';
      window.scrollTo(0, 0);
    }

    async function eliminarTarjeta(id) {
      if (confirm("¿Estás seguro de que deseas quitar tu turno de la pizarra?")) {
        const { error } = await database
          .from('predicacion')
          .delete()
          .eq('id', id);

        if (error) {
          alert("Error al eliminar.");
        } else {
          await cargarTarjetas();
        }
      }
    }
  </script>
</body>
</html>
