<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pizarra Ágil de Predicación</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .tablero {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .columna {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
      width: 200px;
      min-height: 300px;
    }

    .columna h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .tarjeta {
      background: rgba(255,255,255,0.2);
      margin: 5px 0;
      padding: 10px;
      border-radius: 8px;
      cursor: grab;
    }

    .tarjeta:active {
      cursor: grabbing;
    }

    .columna.dragover {
      background: rgba(255,255,255,0.3);
    }

    .formulario {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
      border: none;
      border-radius: 5px;
    }

    button {
      background: #ffcc00;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>📌 Pizarra Ágil de Predicación</h1>

  <div class="formulario">
    <input type="text" id="nombre" placeholder="Tu nombre" required>
    <select id="dia">
      <option value="lunes">Lunes</option>
      <option value="martes">Martes</option>
      <option value="miércoles">Miércoles</option>
      <option value="jueves">Jueves</option>
      <option value="viernes">Viernes</option>
      <option value="sábado">Sábado</option>
      <option value="domingo">Domingo</option>
    </select>
    <input type="time" id="hora" required>
    <button onclick="agregarTarjeta()">Anotarme</button>
  </div>

  <div class="tablero">
    <div class="columna" id="lunes" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>Lunes</h2>
    </div>
    <div class="columna" id="martes" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>Martes</h2>
    </div>
    <div class="columna" id="miércoles" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>Miércoles</h2>
    </div>
    <div class="columna" id="jueves" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>Jueves</h2>
    </div>
    <div class="columna" id="viernes" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>Viernes</h2>
    </div>
    <div class="columna" id="sábado" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>Sábado</h2>
    </div>
    <div class="columna" id="domingo" ondragover="allowDrop(event)" ondrop="drop(event)">
      <h2>Domingo</h2>
    </div>
  </div>

  <script>
    let contador = 0;

    function agregarTarjeta() {
      const nombre = document.getElementById('nombre').value;
      const dia = document.getElementById('dia').value;
      const hora = document.getElementById('hora').value;

      if(nombre && dia && hora) {
        const tarjeta = document.createElement('div');
        tarjeta.className = 'tarjeta';
        tarjeta.draggable = true;
        tarjeta.id = 'tarjeta' + contador++;
        tarjeta.innerHTML = `<strong>${nombre}</strong><br>${hora}`;
        tarjeta.ondragstart = drag;

        document.getElementById(dia).appendChild(tarjeta);

        document.getElementById('nombre').value = '';
        document.getElementById('hora').value = '';
      } else {
        alert("Completa todos los campos.");
      }
    }

    function drag(event) {
      event.dataTransfer.setData("text", event.target.id);
    }

    function allowDrop(event) {
      event.preventDefault();
      event.currentTarget.classList.add("dragover");
    }

    function drop(event) {
      event.preventDefault();
      const data = event.dataTransfer.getData("text");
      const tarjeta = document.getElementById(data);
      event.currentTarget.appendChild(tarjeta);
      event.currentTarget.classList.remove("dragover");
    }
  </script>
</body>
</html>
